<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>خطأ - بوابة الشهادات</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; background: #f0f4f8; }
    .box { background: #fff; border-radius: 16px; padding: 40px; max-width: 440px;
           text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
    h2 { color: #991b1b; margin-bottom: 14px; }
    p  { color: #64748b; line-height: 1.7; }
    a  { display: inline-block; margin-top: 20px; padding: 12px 28px;
         background: #16a34a; color: #fff; text-decoration: none;
         border-radius: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <p style="font-size:3rem">⚠️</p>
    <h2>رابط غير صالح</h2>
    <p>{{ message }}</p>
    <a href="/">العودة للبوابة</a>
  </div>
</body>
</html>
